# Prometheus Configuration — Project Sentinel

global:
  scrape_interval: 2s # Fast interval for testing/chaos

# ---------------------------------------------------------------------------
# Alerting
# Tells Prometheus where to send firing alerts. alertmanager is resolved via
# Docker's internal DNS because both containers share the same Compose network.
# ---------------------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# ---------------------------------------------------------------------------
# Rule Files
# Prometheus loads these files and evaluates every rule on each scrape cycle.
# The path is the in-container path set by the volume mount in docker-compose.
# ---------------------------------------------------------------------------
rule_files:
  - '/etc/prometheus/alert-rules.yml'

# ---------------------------------------------------------------------------
# Scrape Configs
# Scrapes lab-rat's Spring Boot actuator endpoint.
# lab-rat is resolved via Docker's internal DNS because both containers share
# the same Compose network (sentinel-net).
# ---------------------------------------------------------------------------
scrape_configs:
  - job_name: 'lab-rat'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # lab-rat is a named container on sentinel-net — Docker DNS resolves it directly
      - targets: ['lab-rat:8080']
