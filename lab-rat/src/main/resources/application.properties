spring.application.name=lab-rat
server.port=8080

# Expose Actuator and Prometheus endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Database setup for Chaos Endpoints (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Show SQL to be sure our chaotic queries run
spring.jpa.show-sql=true

# Log to a file so that Sentinel's LogFetcher tool can read it programmatically
logging.file.name=application.log

# Actuator CORS — required separately from MVC CORS config
management.endpoints.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

