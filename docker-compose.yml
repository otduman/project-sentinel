# Docker Compose — Project Sentinel
#
# Runs the full observability stack: Prometheus (scraping + alerting),
# AlertManager (alert routing), and Grafana (dashboards).
# lab-rat, sentinel-agent, and sentinel-dashboard all run as containers
# on the shared sentinel-net Docker network.

services:

  # ---------------------------------------------------------------------------
  # Prometheus
  # Scrapes lab-rat metrics, evaluates alert rules, and forwards firing alerts
  # to AlertManager. --web.enable-lifecycle allows hot-reloading the config via
  # POST /-/reload without restarting the container.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      # Main Prometheus config
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Alert rules evaluated every scrape cycle
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Enables POST /-/reload for config hot-reload without container restart
      - '--web.enable-lifecycle'
    depends_on:
      - alertmanager
    networks:
      - sentinel-net

  # ---------------------------------------------------------------------------
  # AlertManager
  # Receives alerts from Prometheus, groups them, applies silence/inhibition
  # rules, and routes them to the configured receiver (sentinel-agent webhook).
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: sentinel-alertmanager
    ports:
      # AlertManager UI and Prometheus-to-AlertManager API
      - "9093:9093"
    volumes:
      # Routing and receiver configuration
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - sentinel-net

  # ---------------------------------------------------------------------------
  # Grafana
  # Visualization layer. Datasource and dashboard setup is done manually via
  # the UI or via provisioning files (not yet configured).
  # Grafana automatically connects to datasources configured in the UI.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - sentinel-net

  # ---------------------------------------------------------------------------
  # Postgres
  # Optional persistent database for sentinel-agent investigations.
  # Activate with: SPRING_PROFILES_ACTIVE=postgres (set in .env)
  # H2 in-memory is the default — Postgres is only needed for data durability
  # across agent restarts or for multi-instance deployments.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sentinel
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-net

  lab-rat:
    build:
      context: .
      dockerfile: lab-rat/Dockerfile
    container_name: sentinel-lab-rat
    ports:
      - "8080:8080"
    volumes:
      - lab-rat-logs:/logs
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - sentinel-net

  sentinel-agent:
    build:
      context: .
      dockerfile: sentinel-agent/Dockerfile
    container_name: sentinel-agent
    ports:
      - "8081:8081"
    volumes:
      - lab-rat-logs:/logs
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker,postgres
    depends_on:
      - postgres
      - lab-rat
    networks:
      - sentinel-net
    # Uncomment on Linux to enable JVM profiling across containers:
    # pid: "host"

  sentinel-dashboard:
    build:
      context: sentinel-dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    ports:
      - "5173:80"
    depends_on:
      - sentinel-agent
    networks:
      - sentinel-net

volumes:
  sentinel-postgres-data:
  lab-rat-logs:

networks:
  sentinel-net:
    driver: bridge
