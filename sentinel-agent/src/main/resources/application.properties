server.port=8081

gemini.api.key=${GEMINI_API_KEY}

# Path config for tools
lab.rat.log.path=../lab-rat/application.log
lab.rat.jar.path=../sentinel-core/build/libs/sentinel-core-1.0-SNAPSHOT.jar

# H2 in-memory database (default profile)
spring.datasource.url=jdbc:h2:mem:sentinel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Enable scheduling
spring.task.scheduling.pool.size=2

# Allow indefinite async connections (required for SSE / SseEmitter)
spring.mvc.async.request-timeout=-1

# Upstream URLs for the dashboard proxy endpoints (override per profile)
sentinel.proxy.prometheus-url=http://localhost:9090
sentinel.proxy.alertmanager-url=http://localhost:9093
