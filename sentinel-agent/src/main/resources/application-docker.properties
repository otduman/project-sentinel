# Paths when running inside Docker — shared volume for lab-rat logs
lab.rat.log.path=/logs/application.log
lab.rat.jar.path=/app/sentinel-core.jar

# H2 console not useful in Docker (using Postgres profile alongside)
spring.h2.console.enabled=false

# Docker service hostnames (Docker DNS resolves these on sentinel-net)
sentinel.proxy.prometheus-url=http://prometheus:9090
sentinel.proxy.alertmanager-url=http://alertmanager:9093

# Silence noisy Hibernate DDL/migration and connection pool logs
logging.level.org.hibernate.tool.schema=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.orm.jpa=WARN
